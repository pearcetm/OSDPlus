<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>OSDPlus demo: AnnotationToolkit toolbar tool subset</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/test/demo/assets/common.css" />
  </head>
  <body>
    <div id="viewer" class="viewer"></div>

    <script src="/test/demo/assets/demo-tiles.js"></script>
    <!-- One script: osdplus.min.js embeds OpenSeadragon + osd-paperjs-annotation (verbatim) then the app. See README. -->
    <script src="/dist/osdplus.min.js"></script>
    <script src="/test/demo/assets/nav.js"></script>
    <script>
      window.addEventListener('DOMContentLoaded', () => {
        // Subset of tool ids from osd-paperjs-annotation AnnotationToolset (see upstream toolConstructors).
        // Replaces many single-tool demos with one page; add or remove ids to experiment.
        const viewer = new OSDPlus({
          id: 'viewer',
          crossOriginPolicy: 'Anonymous',
          tileSources: window.OSDPLUS_DEMO_TILE_SOURCE,
          paperOverlays: {
            annotationToolkit: {
              toolbar: { tools: ['polygon', 'select', 'transform', 'style', 'rectangle'] },
              layerUI: true,
              layout: true,
            },
          },
        });
        void viewer;
      });
    </script>
  </body>
</html>
