<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>OSDPlus demo: Canvas / WebGL drawer toggle</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/test/demo/assets/common.css" />
    <style>
      /* One grid child for row 2 (nav.js); viewer + hint live inside this root. */
      body.with-topbar .drawer-demo-root {
        display: flex;
        flex-direction: column;
        min-height: 0;
        height: 100%;
        position: relative;
      }
      body.with-topbar .drawer-demo-root .viewer {
        flex: 1;
        min-height: 0;
        height: auto;
      }
      .drawer-hint {
        position: absolute;
        left: 12px;
        bottom: 12px;
        z-index: 2;
        margin: 0;
        padding: 8px 12px;
        font:
          13px/1.4 system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        color: #eee;
        background: rgba(0, 0, 0, 0.55);
        border-radius: 6px;
        max-width: min(420px, calc(100% - 24px));
        pointer-events: none;
      }
      .drawer-hint code {
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="drawer-demo-root">
      <div id="viewer" class="viewer"></div>
      <p class="drawer-hint" id="drawer-status">
        Open the gear → <strong>Rendering</strong> to switch Canvas / WebGL. Choice persists under
        <code>localStorage['osdplus-demo-drawer']</code>.
      </p>
    </div>

    <script src="/test/demo/assets/demo-tiles.js"></script>
    <script src="/dist/osdplus.min.js"></script>
    <script src="/test/demo/assets/nav.js"></script>
    <script>
      window.addEventListener('DOMContentLoaded', () => {
        const status = document.getElementById('drawer-status');
        const viewer = new OSDPlus({
          id: 'viewer',
          crossOriginPolicy: 'Anonymous',
          tileSources: window.OSDPLUS_DEMO_TILE_SOURCE,
          drawer: 'canvas',
          paperOverlays: {
            configurationWidget: {
              storageKey: 'osdplus-demo-drawer',
              drawerToggle: {
                enabled: true,
                defaultDrawer: 'canvas',
              },
            },
            annotationToolkit: { toolbar: true, layerUI: true, layout: true },
            fieldOfView: true,
            screenshot: true,
            rotationControl: true,
            order: ['annotationToolkit', 'fieldOfView', 'screenshot', 'rotationControl'],
          },
        });

        function updateStatus() {
          const type = viewer.drawer?.getType?.() ?? 'unknown';
          status.innerHTML =
            'Active drawer: <code>' +
            type +
            '</code>. Gear → <strong>Rendering</strong> to switch; reload to test persistence.';
        }

        viewer.addHandler('open', updateStatus);
      });
    </script>
  </body>
</html>
