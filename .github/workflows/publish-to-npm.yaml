# Adapted from https://docs.npmjs.com/generating-provenance-statements
# Trusted publishing / OIDC — requires npm CLI 11.5.1+ (Node 24 or explicit npm pin).

name: Publish Package to npmjs

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@11.6.2
      - run: npm --version
      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public
